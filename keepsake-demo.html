<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GatherWall — Animated Keepsake Story</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   STORYSONG STORY ENGINE — data-driven, theme-able, any-length
   Everything visual is driven by the STORIES config below.
   This single file proves the flexibility: one engine,
   three completely different stories. Double-click to open.
   ============================================================ */
:root{
  --bg:#0d0804; --text:#f0e6c8; --accent:#C2A058; --accent2:#E4C77A;
  --serif:'Fraunces', Georgia, serif; --sans:'Inter', system-ui, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--serif);
  overflow:hidden;width:100vw;height:100vh;user-select:none;}
#stage{width:100vw;height:100vh;position:relative;overflow:hidden;}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;opacity:0;
  transition:opacity 1.8s ease;padding:40px;}
.scene.active{opacity:1;}.scene.exit{opacity:0;}
#particles{position:absolute;inset:0;pointer-events:none;z-index:0;}
.scene-art{position:relative;z-index:2;margin-bottom:32px;}
.scene-art svg{filter:drop-shadow(0 0 20px rgba(194,160,88,0.3));}
.scene-title{font-size:clamp(28px,5vw,52px);font-style:italic;color:var(--accent);
  letter-spacing:2px;text-align:center;z-index:2;position:relative;
  opacity:0;transform:translateY(20px);
  transition:opacity 1.2s ease .6s,transform 1.2s ease .6s;}
.scene.active .scene-title{opacity:1;transform:translateY(0);}
.scene-subtitle{font-size:clamp(14px,2vw,20px);color:rgba(240,230,200,.7);
  letter-spacing:3px;text-align:center;margin-top:12px;
  font-family:var(--sans);font-weight:200;text-transform:uppercase;
  z-index:2;position:relative;opacity:0;transform:translateY(16px);
  transition:opacity 1.2s ease 1s,transform 1.2s ease 1s;}
.scene.active .scene-subtitle{opacity:1;transform:translateY(0);}
.scene-lyric{font-size:clamp(13px,1.8vw,18px);color:rgba(194,160,88,.85);
  font-style:italic;text-align:center;margin-top:20px;max-width:640px;
  line-height:1.8;z-index:2;position:relative;opacity:0;
  transition:opacity 1.4s ease 1.4s;}
.scene.active .scene-lyric{opacity:1;}
.scene-quote{font-size:clamp(20px,3.4vw,38px);font-style:italic;
  color:var(--accent);text-align:center;max-width:760px;line-height:1.5;
  z-index:2;position:relative;opacity:0;transform:translateY(20px);
  transition:opacity 1.4s ease .6s,transform 1.4s ease .6s;}
.scene.active .scene-quote{opacity:1;transform:translateY(0);}
.quote-attrib{font-family:var(--sans);font-size:13px;letter-spacing:3px;
  text-transform:uppercase;color:rgba(240,230,200,.55);margin-top:24px;
  z-index:2;position:relative;opacity:0;transition:opacity 1.4s ease 1.4s;}
.scene.active .quote-attrib{opacity:1;}
.photo-row{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;
  z-index:2;position:relative;margin-bottom:8px;max-width:90vw;}
.photo-label{font-size:11px;letter-spacing:2px;color:rgba(194,160,88,.7);
  text-align:center;margin-top:8px;font-family:var(--sans);text-transform:uppercase;
  z-index:2;position:relative;}
.gold-line{width:120px;height:1px;
  background:linear-gradient(to right,transparent,var(--accent),transparent);
  margin:20px auto;z-index:2;position:relative;opacity:0;
  transition:opacity 1.2s ease 1.2s;}
.scene.active .gold-line{opacity:1;}
.draw-line{stroke-dasharray:600;stroke-dashoffset:600;transition:stroke-dashoffset 2.5s ease .5s;}
.scene.active .draw-line{stroke-dashoffset:0;}
.draw-line-fast{stroke-dasharray:300;stroke-dashoffset:300;transition:stroke-dashoffset 1.8s ease .8s;}
.scene.active .draw-line-fast{stroke-dashoffset:0;}
.fade-in-art{opacity:0;transition:opacity 1.5s ease 1s;}
.scene.active .fade-in-art{opacity:1;}
.big-title{font-size:clamp(48px,9vw,96px);font-style:italic;color:var(--accent);
  letter-spacing:4px;text-shadow:0 0 60px rgba(194,160,88,.4);text-align:center;
  z-index:2;position:relative;opacity:0;transform:scale(.9);
  transition:opacity 2s ease .5s,transform 2s ease .5s;}
.scene.active .big-title{opacity:1;transform:scale(1);}
.big-sub{font-size:clamp(16px,3vw,28px);color:rgba(194,160,88,.6);
  letter-spacing:10px;text-transform:uppercase;font-family:var(--sans);
  font-weight:200;margin-top:8px;text-align:center;z-index:2;position:relative;
  opacity:0;transition:opacity 2s ease 1.5s;}
.scene.active .big-sub{opacity:1;}
.lang-text{transition:opacity .3s;}
.img-frame{object-fit:cover;border:1.5px solid rgba(194,160,88,.5);display:block;margin:0 auto;}

/* Music player */
#music-player{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  z-index:200;background:rgba(13,8,4,.93);border:1px solid rgba(194,160,88,.35);
  padding:13px 18px 18px;display:flex;align-items:center;gap:14px;
  backdrop-filter:blur(10px);min-width:320px;max-width:92vw;}
#music-player .track-name{font-family:var(--sans);font-size:10px;letter-spacing:2px;
  color:rgba(194,160,88,.8);text-transform:uppercase;flex:1;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;}
#music-player .play-btn{width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(194,160,88,.55);background:rgba(194,160,88,.12);color:var(--accent);
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .2s;}
#music-player .play-btn:hover{background:rgba(194,160,88,.28);}
.track-select{background:rgba(194,160,88,.06);border:1px solid rgba(194,160,88,.25);
  color:rgba(194,160,88,.7);font-size:10px;font-family:var(--sans);letter-spacing:1px;
  cursor:pointer;outline:none;flex-shrink:0;padding:4px 6px;}
.track-select option{background:#1a0d04;color:var(--accent);}
.progress-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:3px;
  background:rgba(194,160,88,.1);cursor:pointer;}
.progress-bar-fill{height:100%;background:linear-gradient(to right,var(--accent),var(--accent2));
  width:0%;pointer-events:none;transition:width .8s linear;}
.vol-icon{font-size:14px;color:rgba(194,160,88,.45);cursor:pointer;flex-shrink:0;
  transition:color .2s;background:none;border:none;}
.vol-icon:hover{color:var(--accent);}

#progress{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;z-index:100;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(194,160,88,.25);
  transition:background .4s,transform .4s;cursor:pointer;}
.dot.active{background:var(--accent);transform:scale(1.4);}
#nav{position:fixed;bottom:28px;right:40px;display:flex;gap:12px;z-index:100;}
#nav button{background:rgba(194,160,88,.12);border:1px solid rgba(194,160,88,.35);
  color:var(--accent);padding:8px 20px;font-size:12px;letter-spacing:2px;
  font-family:var(--sans);cursor:pointer;text-transform:uppercase;transition:background .3s;}
#nav button:hover{background:rgba(194,160,88,.25);}
#scene-counter{position:fixed;top:28px;right:40px;font-size:11px;letter-spacing:3px;
  color:rgba(194,160,88,.4);font-family:var(--sans);z-index:100;text-transform:uppercase;}
.ctrl-chip{position:fixed;top:28px;font-size:11px;letter-spacing:2px;
  color:rgba(194,160,88,.4);font-family:var(--sans);z-index:100;cursor:pointer;
  text-transform:uppercase;border:1px solid rgba(194,160,88,.2);padding:6px 14px;
  transition:color .3s,border-color .3s;}
.ctrl-chip:hover,.ctrl-chip.on{color:var(--accent);border-color:rgba(194,160,88,.5);}
#auto-toggle{left:40px;} #sync-btn{left:130px;}

/* DEV-ONLY story picker (remove for client builds) */
#dev-bar{position:fixed;top:0;left:0;right:0;z-index:500;
  background:rgba(0,0,0,.82);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(194,160,88,.25);
  display:flex;align-items:center;gap:14px;padding:8px 16px;
  font-family:var(--sans);font-size:12px;color:rgba(240,230,200,.75);}
#dev-bar b{color:var(--accent);letter-spacing:2px;text-transform:uppercase;font-size:11px;}
#dev-bar select{background:#1a0d04;color:var(--accent);border:1px solid rgba(194,160,88,.4);
  padding:6px 10px;font-family:var(--sans);font-size:12px;cursor:pointer;}
#dev-bar .tag{color:rgba(240,230,200,.45);}
.dev-shift #scene-counter,.dev-shift #auto-toggle,.dev-shift #sync-btn{top:60px;}
</style>

<body class="dev-shift">

<!-- DEV PICKER — lets you flip between example stories. Delete this block for a real client build. -->
<div id="dev-bar">
  <b>Animated Keepsake Story · examples</b>
  <span class="tag">See another:</span>
  <select id="story-picker" onchange="loadStory(this.value)"></select>
  <span class="tag" id="dev-meta"></span>
  <span class="tag" style="margin-left:auto;">Your story uses your own photos &amp; a custom song ✦ gatherwall.com</span>
</div>

<canvas id="particles"></canvas>
<div id="stage"><!-- scenes injected by engine --></div>

<div id="progress"></div>
<div id="nav">
  <button onclick="prevScene()">◂ Prev</button>
  <button onclick="nextScene()">Next ▸</button>
</div>
<div id="scene-counter"></div>
<div class="ctrl-chip" id="auto-toggle" onclick="toggleAuto()">Auto ▸</div>
<div class="ctrl-chip" id="sync-btn" onclick="toggleSync()">⟳ Sync</div>

<div id="music-player">
  <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
  <span class="track-name" id="track-name">—</span>
  <select class="track-select" id="track-select" onchange="changeTrack(this.value)"></select>
  <button class="vol-icon" onclick="toggleMute()" id="vol-btn">🔊</button>
  <div class="progress-bar-wrap" id="progress-wrap" onclick="seekAudio(event)">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
</div>
<audio id="audio-player" preload="auto"></audio>

<script>
/* ============================================================
   1. PLACEHOLDER IMAGE HELPER
   Generates an offline portrait so the lab works with no photos.
   In a real build, replace photo values with real image URLs
   (or base64 data URIs baked in by the embed step).
   ============================================================ */
function ph(initial, tone){
  tone = tone || '#C2A058';
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'>
    <defs><radialGradient id='g' cx='50%' cy='38%' r='70%'>
      <stop offset='0%' stop-color='${tone}' stop-opacity='0.30'/>
      <stop offset='100%' stop-color='#0d0804' stop-opacity='0.95'/></radialGradient></defs>
    <rect width='400' height='400' fill='url(#g)'/>
    <text x='200' y='250' font-family='Georgia' font-size='150' font-style='italic'
      fill='${tone}' fill-opacity='0.55' text-anchor='middle'>${initial}</text></svg>`;
  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}

   2. ILLUSTRATION MOTIFS (reusable line-art for non-photo scenes)
   Add a new key here and any scene can use motif:'name'.
   ============================================================ */

    <rect x="190" y="60" width="130" height="80" rx="4" fill="none" stroke="rgba(194,160,88,0.2)" class="fade-in-art"/>
    <text x="255" y="108" text-anchor="middle" fill="var(--accent)" font-size="11" font-family="Georgia" font-style="italic" class="fade-in-art">{{B}}</text>

  strength: `<svg width="260" height="200" viewBox="0 0 260 200">

    <line x1="80" y1="50" x2="180" y2="50" stroke="var(--accent)" stroke-width="1.2" class="draw-line-fast"/>

    <path d="M60 130 L60 80 L100 110 L150 50 L200 110 L240 80 L240 130 Z" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round" class="draw-line"/>
    <circle cx="150" cy="50" r="7" fill="var(--accent)" class="fade-in-art" style="transition-delay:1.5s;"/>
    <line x1="50" y1="135" x2="250" y2="135" stroke="rgba(194,160,88,0.4)" class="draw-line-fast"/></svg>`,
  mountain: `<svg width="320" height="190" viewBox="0 0 320 190">

    <path d="M120 50 L100 80 L140 80 Z" fill="var(--accent)" fill-opacity="0.5" class="fade-in-art"/>
    <circle cx="215" cy="70" r="4" fill="var(--accent)" class="fade-in-art" style="transition-delay:1.6s;"/>
    <line x1="20" y1="170" x2="300" y2="170" stroke="rgba(194,160,88,0.4)" class="draw-line-fast"/></svg>`,
  infinity: `<svg width="300" height="160" viewBox="0 0 300 160">
    <path d="M150 80 C150 40 90 40 90 80 C90 120 150 120 150 80 C150 40 210 40 210 80 C210 120 150 120 150 80 Z"
      fill="none" stroke="var(--accent)" stroke-width="1.3" class="draw-line" stroke-dasharray="520" stroke-dashoffset="520"/>
    <text x="150" y="140" text-anchor="middle" fill="rgba(194,160,88,0.5)" font-size="16" class="fade-in-art">✦</text></svg>`,
  rings: `<svg width="300" height="170" viewBox="0 0 300 170">
    <circle cx="120" cy="90" r="55" fill="none" stroke="var(--accent)" stroke-width="1.4" class="draw-line" stroke-dasharray="360" stroke-dashoffset="360"/>
    <circle cx="180" cy="90" r="55" fill="none" stroke="var(--accent)" stroke-width="1.4" class="draw-line" stroke-dasharray="360" stroke-dashoffset="360" style="transition-delay:0.9s;"/>
    <text x="150" y="40" text-anchor="middle" fill="rgba(194,160,88,0.6)" font-size="16" class="fade-in-art">✦</text></svg>`,
  path: `<svg width="320" height="180" viewBox="0 0 320 180">
    <path d="M40 160 C120 160 110 60 200 60 C260 60 270 30 290 30" fill="none" stroke="var(--accent)" stroke-width="1.4" class="draw-line"/>
    <circle cx="40" cy="160" r="5" fill="var(--accent)" class="fade-in-art"/>
    <circle cx="290" cy="30" r="6" fill="var(--accent)" class="fade-in-art" style="transition-delay:1.8s;"/></svg>`,
};

/* ============================================================
   3. THE STORIES  ← this is the ONLY thing that changes per client.
   Three deliberately different examples to show the range:
   different occasions, tones, lengths, themes, languages.
   ============================================================ */

    theme:{ bg:'#0d0804', text:'#f0e6c8', accent:'#C2A058', accent2:'#E4C77A', serif:"'Fraunces',Georgia,serif" },
    tracks:[
      {file:'fifty-years-of-gold.mp3', label:'Version 1 — English', lang:'en'},

  /* ---- B) GRADUATION · single subject, no partner/children · 7 scenes · blue theme ---- */

    meta:{ recipient:'Daniel', occasion:'Doctor Daniel', lang2:null },

  /* ---- C) IN MEMORY · gentle celebration of life · 8 scenes · warm theme ---- */
  margaret: {
    meta:{ recipient:'Margaret', occasion:'1942 — 2026', lang2:null },
    theme:{ bg:'#120c06', text:'#f3e9d6', accent:'#D8B26A', accent2:'#EBD49A', serif:"'Georgia',serif" },

    scenes:[
      {type:'title', title:{en:'Margaret'}, subtitle:{en:'A Life Well Loved · 1942 — 2026'},

      {type:'photo', photo:ph('M','#D8B26A'), photoLabel:'Margaret', photoShape:'circle',
        title:{en:'Our Mum, Our Nan'},
        lyric:{en:'Eighty-four years of warmth, mischief and unshakeable love.'}},
      {type:'illustration', motif:'bridge', motifData:{A:'Yorkshire', B:'The World'},
        title:{en:'A Wanderer\'s Heart'}, subtitle:{en:'Home was wherever her people were'},
        lyric:{en:'She filled a small life with an enormous amount of living.'}},
      {type:'photo-grid', photos:[
        {src:ph('💛')},{src:ph('🌷')},{src:ph('☕')},{src:ph('📖')}],
        title:{en:'The Little Things She Loved'},
        subtitle:{en:'Tea · Gardens · A good book · Her family'},
        lyric:{en:'Joy, she taught us, lives in the ordinary days.'}},
      {type:'quote', quote:{en:'"Be kind, be brave, and always come home for Sunday lunch."'},
        attrib:{en:'— Margaret, to everyone she ever met'}},
      {type:'photo', photo:ph('F','#D8B26A'), photoLabel:'Four generations', photoShape:'rect',
        title:{en:'The Family She Grew'},
        lyric:{en:'Her greatest legacy is sitting in this room.'}},
      {type:'illustration', motif:'infinity',
        title:{en:'Always With Us'},
        lyric:{en:'Love doesn\'t end. It just changes address.'}},

/* ============================================================
   4. THE ENGINE  (you should rarely need to touch below here)
   ============================================================ */
const stage=document.getElementById('stage');
const audio=document.getElementById('audio-player');
const playBtn=document.getElementById('play-btn');
const progFill=document.getElementById('progress-fill');
const volBtn=document.getElementById('vol-btn');

let STORY=null, TRACKS=[], TOTAL=0, current=0;
let autoPlay=false, autoTimer=null, syncMode=false, sceneTimes=[], muted=false, lang='en';

function esc(s){return (s==null?'':String(s));}
function t(obj){ if(!obj) return ''; return obj[lang]!=null?obj[lang]:(obj.en||''); }

function motifSVG(scene){
  let svg=MOTIFS[scene.motif]||'';
  const d=scene.motifData||{};
  svg=svg.replace('{{A}}',esc(d.A)).replace('{{B}}',esc(d.B));
  return svg;
}
function langAttrs(obj){
  if(!obj) return '';
  let a=`data-en="${esc(obj.en).replace(/"/g,'&quot;')}"`;
  if(STORY.meta.lang2 && obj[STORY.meta.lang2.code]!=null)
    a+=` data-${STORY.meta.lang2.code}="${esc(obj[STORY.meta.lang2.code]).replace(/"/g,'&quot;')}"`;
  return a;
}

function buildScene(scene,i){
  const el=document.createElement('div');
  el.className='scene'; el.id='scene-'+i;
  let html='';

  if(scene.type==='title'){
    html=`<div class="big-title">${t(scene.title)}</div>
      ${scene.subtitle?`<div class="big-sub">${t(scene.subtitle)}</div>`:''}
      <div class="gold-line" style="width:200px;margin-top:28px;"></div>
      ${scene.lyric?`<div class="scene-lyric lang-text" style="transition-delay:2s;" ${langAttrs(scene.lyric)}>${t(scene.lyric)}</div>`:''}`;
  }
  else if(scene.type==='illustration'){
    html=`<div class="scene-art">${motifSVG(scene)}</div>
      <div class="scene-title lang-text" ${langAttrs(scene.title)}>${t(scene.title)}</div>
      <div class="gold-line"></div>
      ${scene.subtitle?`<div class="scene-subtitle lang-text" ${langAttrs(scene.subtitle)}>${t(scene.subtitle)}</div>`:''}
      ${scene.lyric?`<div class="scene-lyric lang-text" ${langAttrs(scene.lyric)}>${t(scene.lyric)}</div>`:''}`;
  }
  else if(scene.type==='photo'){
    const shape=scene.photoShape==='rect'
      ? 'width:260px;height:200px;border-radius:12px;'
      : 'width:180px;height:180px;border-radius:50%;';
    html=`<div style="position:relative;z-index:2;margin-bottom:8px;">
        <img class="img-frame" src="${scene.photo}" style="${shape}" onerror="this.style.opacity='0.25'"/></div>
      ${scene.photoLabel?`<div class="photo-label">${esc(scene.photoLabel)}</div>`:''}
      <div class="scene-title lang-text" style="margin-top:18px;" ${langAttrs(scene.title)}>${t(scene.title)}</div>
      <div class="gold-line"></div>
      ${scene.subtitle?`<div class="scene-subtitle lang-text" ${langAttrs(scene.subtitle)}>${t(scene.subtitle)}</div>`:''}
      ${scene.lyric?`<div class="scene-lyric lang-text" ${langAttrs(scene.lyric)}>${t(scene.lyric)}</div>`:''}`;
  }
  else if(scene.type==='photo-grid'){
    const n=scene.photos.length;
    const size=n<=2?160:(n<=4?140:110);
    const cells=scene.photos.map(p=>`<div>
        <img class="img-frame" src="${p.src}" style="width:${size}px;height:${size}px;border-radius:50%;" onerror="this.style.opacity='0.25'"/>
        ${p.label?`<div class="photo-label">${esc(p.label)}</div>`:''}</div>`).join('');
    html=`<div class="photo-row">${cells}</div>
      <div class="scene-title lang-text" style="margin-top:16px;" ${langAttrs(scene.title)}>${t(scene.title)}</div>
      <div class="gold-line"></div>
      ${scene.subtitle?`<div class="scene-subtitle lang-text" ${langAttrs(scene.subtitle)}>${t(scene.subtitle)}</div>`:''}
      ${scene.lyric?`<div class="scene-lyric lang-text" ${langAttrs(scene.lyric)}>${t(scene.lyric)}</div>`:''}`;
  }
  else if(scene.type==='quote'){
    html=`<div class="scene-quote lang-text" ${langAttrs(scene.quote)}>${t(scene.quote)}</div>
      ${scene.attrib?`<div class="quote-attrib lang-text" ${langAttrs(scene.attrib)}>${t(scene.attrib)}</div>`:''}`;
  }
  else if(scene.type==='finale'){
    html=`${scene.motif?`<div class="scene-art">${motifSVG(scene)}</div>`:''}
      <div class="big-title" style="font-size:clamp(32px,6vw,72px);">${t(scene.headline)}</div>
      ${scene.subtitle?`<div class="scene-subtitle lang-text" style="margin-top:16px;letter-spacing:8px;" ${langAttrs(scene.subtitle)}>${t(scene.subtitle)}</div>`:''}
      ${scene.lyric?`<div class="scene-lyric lang-text" style="transition-delay:2.2s;color:var(--accent);" ${langAttrs(scene.lyric)}>${t(scene.lyric)}</div>`:''}`;
  }
  el.innerHTML=html;
  return el;
}

function applyTheme(theme){
  const r=document.documentElement.style;
  r.setProperty('--bg',theme.bg||'#0d0804');
  r.setProperty('--text',theme.text||'#f0e6c8');
  r.setProperty('--accent',theme.accent||'#C2A058');
  r.setProperty('--accent2',theme.accent2||'#E4C77A');
  r.setProperty('--serif',theme.serif||"'Georgia',serif");
}

function renderStory(key){
  STORY=STORIES[key]; if(!STORY) return;
  lang='en';
  applyTheme(STORY.theme||{});
  // scenes
  stage.innerHTML='';
  STORY.scenes.forEach((s,i)=>stage.appendChild(buildScene(s,i)));
  TOTAL=STORY.scenes.length;
  // dots
  const prog=document.getElementById('progress'); prog.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':''); d.onclick=()=>goTo(i); prog.appendChild(d);
  }
  // tracks
  TRACKS=STORY.tracks||[];
  const sel=document.getElementById('track-select'); sel.innerHTML='';
  TRACKS.forEach((tr,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=tr.label; sel.appendChild(o); });
  current=0; goTo(0);
  loadTrack(0);
  document.getElementById('dev-meta').textContent =
    `${STORY.meta.recipient} · ${STORY.meta.occasion} · ${TOTAL} scenes · ${STORY.meta.lang2?('EN + '+STORY.meta.lang2.label):'English'}`;
}

/* ---- particles ---- */
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
let particles=[];
function resizeCanvas(){canvas.width=innerWidth;canvas.height=innerHeight;}
resizeCanvas(); addEventListener('resize',resizeCanvas);
for(let i=0;i<60;i++)particles.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  r:Math.random()*1.5+0.3,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,a:Math.random()*0.5+0.1});
function animParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const accent=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#C2A058';
  const rgb=hexToRgb(accent);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;
    if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${p.a})`;ctx.fill();});
  requestAnimationFrame(animParticles);
}
function hexToRgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');
  const n=parseInt(h,16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255};}
animParticles();

/* ---- navigation ---- */
function goTo(n){
  const scenes=stage.querySelectorAll('.scene'); if(!scenes.length) return;
  const prev=current; scenes[prev].classList.remove('active'); scenes[prev].classList.add('exit');
  setTimeout(()=>scenes[prev]&&scenes[prev].classList.remove('exit'),2000);
  current=n; scenes[current].classList.add('active');
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===current));
  document.getElementById('scene-counter').textContent=`Scene ${current+1} / ${TOTAL}`;
  if(syncMode&&sceneTimes.length&&audio) audio.currentTime=sceneTimes[n]||0;
}
function nextScene(){goTo(current<TOTAL-1?current+1:0); if(autoPlay)resetAutoTimer();}
function prevScene(){goTo(current>0?current-1:0); if(autoPlay)resetAutoTimer();}
function toggleAuto(){autoPlay=!autoPlay;const b=document.getElementById('auto-toggle');
  b.classList.toggle('on',autoPlay);b.textContent=autoPlay?'Auto ■':'Auto ▸';
  if(autoPlay)resetAutoTimer();else clearInterval(autoTimer);}
function resetAutoTimer(){clearInterval(autoTimer);autoTimer=setInterval(nextScene,22000);}
addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')nextScene();if(e.key==='ArrowLeft')prevScene();});

/* ---- language ---- */
function setLanguage(l){ lang=l;
  document.querySelectorAll('.lang-text').forEach(el=>{const x=el.getAttribute('data-'+l);if(x)el.innerHTML=x;});
}

/* ---- audio sync ---- */
function buildSceneTimes(duration){
  const out=[]; for(let i=0;i<TOTAL;i++) out.push(Math.floor((i/TOTAL)*duration)); sceneTimes=out;
}
function toggleSync(){
  if(syncMode){syncMode=false;updateSyncBtn();return;}
  const go=()=>{buildSceneTimes(audio.duration||0);syncMode=true;updateSyncBtn();goTo(0);
    if(audio.src){audio.currentTime=0;if(audio.paused){audio.play().catch(()=>{});playBtn.textContent='⏸';}}};
  if(audio.src&&!audio.duration)audio.addEventListener('loadedmetadata',go,{once:true});else go();
}
function updateSyncBtn(){const b=document.getElementById('sync-btn');
  b.textContent=syncMode?'⟳ Synced':'⟳ Sync';b.classList.toggle('on',syncMode);}

/* ---- music player ---- */
function loadTrack(idx){
  if(!TRACKS[idx]) return;
  audio.src=TRACKS[idx].file||'';
  document.getElementById('track-name').textContent=TRACKS[idx].label;
  document.getElementById('track-select').value=idx;
  if(audio.src)audio.load();
  setLanguage(TRACKS[idx].lang||'en');
}
function togglePlay(){
  if(!audio.src){ const tn=document.getElementById('track-name'); const o=tn.textContent; tn.textContent='♪ Your custom song plays here'; setTimeout(()=>tn.textContent=o,2200); return; }
  if(audio.paused){audio.play().catch(()=>{});playBtn.textContent='⏸';}
  else{audio.pause();playBtn.textContent='▶';}
}
function changeTrack(idx){const w=!audio.paused;loadTrack(parseInt(idx));if(w&&audio.src)audio.play().catch(()=>{});}
function toggleMute(){muted=!muted;audio.muted=muted;volBtn.textContent=muted?'🔇':'🔊';}
function seekAudio(e){if(!audio.duration)return;const r=document.getElementById('progress-wrap').getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;}
audio.addEventListener('timeupdate',()=>{if(!audio.duration)return;
  progFill.style.width=(audio.currentTime/audio.duration*100)+'%';
  if(syncMode&&sceneTimes.length){let tt=0;for(let i=sceneTimes.length-1;i>=0;i--){if(audio.currentTime>=sceneTimes[i]){tt=i;break;}}
    if(tt!==current){syncMode=false;goTo(tt);syncMode=true;}}});
audio.addEventListener('ended',()=>{playBtn.textContent='▶';progFill.style.width='0%';syncMode=false;updateSyncBtn();});

/* ---- dev picker + boot ---- */
function loadStory(key){renderStory(key);}
(function init(){
  const picker=document.getElementById('story-picker');
  const labels={wedding:'★ Wedding — Tom & Priya (flagship)',grace:'50th Birthday (bilingual)',daniel:'Graduation',margaret:'In Memory (celebration of life)'};
  Object.keys(STORIES).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=labels[k]||k;picker.appendChild(o);});
  renderStory('wedding');
})();
</script>
